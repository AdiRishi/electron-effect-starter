packages:
  - apps/*
  - packages/*
  - scripts

autoInstallPeers: false

# Packages allowed to run install scripts (native builds / binary downloads).
allowBuilds:
  electron: true
  electron-winstaller: true
  msgpackr-extract: true

overrides:
  # Pin the platform package to the same effect beta train as the catalog.
  "@effect/platform-node-shared": 4.0.0-beta.78
  # electron-builder's native-rebuild tooling needs a node-abi recent enough to
  # know Electron 33's ABI.
  node-abi: 4.31.0
  # Deduplicate electron-builder's transitive toml parser onto one version.
  toml: 4.1.1

peerDependencyRules:
  ignoreMissing:
    # Optional electron-builder target we don't build (NSIS is used on Windows).
    - electron-builder-squirrel-windows
    # Optional Redis peer of @effect/platform-node-shared; unused here.
    - ioredis

# Single source of truth for dependency versions. Every package pins with
# the `catalog:` protocol (e.g. `"effect": "catalog:"`) so upgrades happen
# in exactly one place. This is the pattern extracted from T3 Code.
catalog:
  "@effect/platform-node": 4.0.0-beta.78
  "@effect/vitest": 4.0.0-beta.78
  "@types/node": 24.12.4
  effect: 4.0.0-beta.78
  prettier: ^3.9.4
  typescript: ~6.0.3
  vite: ^8.0.0
  vitest: ^4.1.9

onlyBuiltDependencies:
  - electron
  - esbuild
  - msgpackr-extract
