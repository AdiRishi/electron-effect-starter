packages:
  - apps/*
  - oxlint-plugin-app
  - packages/*
  - scripts

allowBuilds:
  electron: true
  electron-winstaller: true
  msgpackr-extract: true

overrides:
  "@effect/platform-node-shared": "catalog:"
  # Deduplicate electron-builder's transitive toml parser onto one version.
  toml: 4.1.1

peerDependencyRules:
  ignoreMissing:
    # Optional electron-builder target we don't build (NSIS is used on Windows).
    - electron-builder-squirrel-windows
    # Optional Redis peer of @effect/platform-node-shared; unused here.
    - ioredis

catalog:
  "@effect/atom-react": 4.0.0-beta.99
  "@effect/platform-node": 4.0.0-beta.99
  "@effect/platform-node-shared": 4.0.0-beta.99
  "@effect/vitest": 4.0.0-beta.99
  "@oxlint/plugins": ^1.72.0
  "@types/node": 24.12.4
  effect: 4.0.0-beta.99
  oxfmt: ^0.57.0
  oxlint: ^1.72.0
  typescript: ~6.0.3
  vite: ^8.1.3
  vitest: ^4.1.9

minimumReleaseAgeExclude:
  - "@effect/atom-react@4.0.0-beta.99"
  - "@effect/platform-node-shared@4.0.0-beta.99"
  - "@effect/platform-node@4.0.0-beta.99"
  - "@effect/vitest@4.0.0-beta.99"
  - "effect@4.0.0-beta.99"
