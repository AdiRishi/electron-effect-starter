packages:
  - apps/*
  - oxlint-plugin-app
  - packages/*
  - scripts

allowBuilds:
  electron: true
  electron-winstaller: true
  msgpackr-extract: true

overrides:
  "@effect/platform-node-shared": "catalog:"
  # electron-builder's native-rebuild tooling needs a node-abi recent enough to
  # know Electron 33's ABI.
  node-abi: 4.31.0
  # Deduplicate electron-builder's transitive toml parser onto one version.
  toml: 4.1.1

peerDependencyRules:
  ignoreMissing:
    # Optional electron-builder target we don't build (NSIS is used on Windows).
    - electron-builder-squirrel-windows
    # Optional Redis peer of @effect/platform-node-shared; unused here.
    - ioredis

catalog:
  "@effect/platform-node": 4.0.0-beta.78
  "@oxlint/plugins": ^1.72.0
  "@effect/platform-node-shared": 4.0.0-beta.78
  "@effect/vitest": 4.0.0-beta.78
  "@types/node": 24.12.4
  effect: 4.0.0-beta.78
  oxfmt: ^0.57.0
  oxlint: ^1.72.0
  typescript: ~6.0.3
  vite: ^8.0.0
  vitest: ^4.1.9
