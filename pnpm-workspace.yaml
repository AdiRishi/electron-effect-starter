packages:
  - apps/*
  - packages/*
  - scripts

autoInstallPeers: false

allowBuilds:
  electron: true
  electron-winstaller: true
  msgpackr-extract: true

overrides:
  "@effect/platform-node-shared": 4.0.0-beta.78
  node-abi: 4.31.0
  toml: 4.1.1

peerDependencyRules:
  ignoreMissing:
    - electron-builder-squirrel-windows
    - ioredis

# Single source of truth for dependency versions. Every package pins with
# the `catalog:` protocol (e.g. `"effect": "catalog:"`) so upgrades happen
# in exactly one place. This is the pattern extracted from T3 Code.
catalog:
  "@effect/platform-node": 4.0.0-beta.78
  "@effect/vitest": 4.0.0-beta.78
  "@types/node": 24.12.4
  effect: 4.0.0-beta.78
  prettier: ^3.9.4
  typescript: ~6.0.3
  vite: ^8.0.0
  vitest: ^4.1.9

onlyBuiltDependencies:
  - electron
  - esbuild
  - msgpackr-extract
