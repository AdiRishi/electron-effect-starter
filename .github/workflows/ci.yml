name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      # electron's postinstall exits 0 without installing on Node >= 24.16
      # (electron#51619), and the desktop unit tests load the `electron`
      # package. The ensure script repairs the runtime, bypassing install.js.
      - run: pnpm --filter @app/desktop ensure:electron
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm format:check
