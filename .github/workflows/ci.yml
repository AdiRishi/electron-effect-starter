name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      # electron's postinstall can exit without downloading the binary, and the
      # desktop unit tests load the `electron` package. Its install.js verifies
      # and repairs, so rebuilding is a no-op when the runtime is healthy.
      - run: pnpm --filter @app/desktop rebuild electron
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm format:check
