name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      # Diagnostic (temporary): what electron-related env does the runner set?
      - run: printenv | grep -i electron || true
      # electron's install.js skips the binary download when
      # ELECTRON_SKIP_BINARY_DOWNLOAD is set, and the desktop unit tests load
      # the `electron` package. Rebuild with the skip cleared; install.js
      # verifies first, so this is a no-op when the runtime is healthy.
      - run: pnpm --filter @app/desktop rebuild electron
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: ""
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm format:check
